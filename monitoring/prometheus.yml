global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'ml-detector'
    static_configs:
      - targets: ['ml-detector:8000']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
